  <style>
    .site-header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(6,8,15,.90);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .navbar-shell {
      min-height: 64px;
      display:flex; align-items:center; justify-content:center;
    }
    .nav-links-shell {
      display:flex; align-items:center; gap:10px; flex-wrap:nowrap;
      overflow-x:auto; overflow-y:hidden; width:100%; justify-content:center;
      scrollbar-width:none; -webkit-overflow-scrolling:touch; padding:8px 0;
    }
    .nav-links-shell::-webkit-scrollbar{display:none;}
    .nav-links-shell a {
      flex:0 0 auto; white-space:nowrap; padding:10px 14px; border-radius:999px;
      color:var(--muted,#9aa3b7); font-weight:700; font-size:.92rem; text-decoration:none;
    }
    .nav-links-shell a:hover, .nav-links-shell a.active {
      color:var(--text,#fff); background:rgba(255,255,255,.06);
    }
    .nav-links-shell .nav-cta {
      border:1px solid rgba(212,168,67,.28); color:var(--gold,#d4a843)!important;
    }
    .logo-band { padding: 14px 0 8px; }
    .logo-band-inner { display:flex; justify-content:center; }
    .hero-logo-img { width:min(62vw,300px); max-width:300px; height:auto; object-fit:contain; filter:drop-shadow(0 0 12px rgba(212,168,67,.12)); }

    .music-page { padding: 8px 0 48px; }
    .page-head { margin: 8px 0 18px; }
    .page-head h1 {
      margin:0; color:var(--gold,#d4a843); font-family:var(--font-display, Georgia, serif);
      font-size: clamp(2rem, 4vw, 3rem); line-height:1;
    }
    .page-head p { margin:8px 0 0; color:var(--muted,#aeb6c8); }
    .radio-dock {
      margin:0 0 24px; display:grid; grid-template-columns:86px 1fr auto; gap:14px; align-items:center;
      border:1px solid rgba(212,168,67,.18); background:rgba(10,14,28,.92);
      border-radius:22px; padding:14px; box-shadow: var(--shadow-md);
    }
    .radio-art {
      width:86px; height:86px; border-radius:18px; overflow:hidden;
      background:linear-gradient(180deg, rgba(212,168,67,.18), rgba(72,112,255,.14));
      border:1px solid rgba(212,168,67,.16); display:flex; align-items:center; justify-content:center;
    }
    .radio-art img { width:100%; height:100%; object-fit:cover; display:block; }
    .radio-art.fallback::before { content:'▶'; color:var(--gold); font-weight:800; font-size:1.7rem; }
    .radio-meta small { display:block; color:var(--gold); text-transform:uppercase; letter-spacing:.12em; font-weight:800; margin-bottom:4px; }
    .radio-meta strong { display:block; font-size:1.1rem; line-height:1.2; }
    .radio-meta span { color:var(--muted); display:block; margin-top:4px; }
    .radio-controls { display:flex; gap:10px; flex-wrap:wrap; }

    .albums-head { display:flex; align-items:end; justify-content:space-between; gap:16px; margin-bottom:14px; }
    .albums-head h2 { margin:0; color:var(--gold,#d4a843); font-family:var(--font-display, Georgia, serif); font-size:1.8rem; }
    .albums-grid { display:grid; grid-template-columns: repeat(5,minmax(0,1fr)); gap:16px; }
    .album-card {
      position:relative; display:block; border-radius:24px; border:1px solid var(--stroke, rgba(255,255,255,.08));
      overflow:hidden; background:rgba(11,17,32,.92); box-shadow:var(--shadow-md);
      cursor:pointer; transition: transform .18s ease, border-color .18s ease;
    }
    .album-card:hover { transform:translateY(-4px); border-color:rgba(212,168,67,.24); }
    .album-cover { position:relative; aspect-ratio:1/1; overflow:hidden; background:var(--bg1, #0b1222); }
    .album-cover img { width:100%; height:100%; object-fit:cover; display:block; }
    .album-cover::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(to top, rgba(6,8,15,.92) 0%, rgba(6,8,15,.14) 58%, transparent 100%);
    }
    .album-badge, .album-lock {
      position:absolute; top:12px; z-index:2; padding:6px 12px; border-radius:999px; font-weight:800; font-size:.76rem;
    }
    .album-badge { left:12px; background:rgba(8,12,22,.86); color:var(--text); border:1px solid rgba(255,255,255,.08); }
    .album-lock { right:12px; background:rgba(8,12,22,.92); color:var(--gold); border:1px solid rgba(212,168,67,.18); }
    .album-copy { position:absolute; inset:auto 0 0 0; z-index:2; padding:14px; }
    .album-title { font-size:1.12rem; font-weight:800; line-height:1.15; margin-top:4px; }
    .album-meta { color:var(--muted); font-size:.9rem; margin-top:4px; }

    .album-panel {
      margin-top:22px; display:none; grid-template-columns:280px 1fr; gap:18px;
      border:1px solid rgba(212,168,67,.18); background:rgba(10,14,28,.92);
      border-radius:24px; padding:18px; box-shadow:var(--shadow-md);
    }
    .album-panel.open { display:grid; }
    .panel-cover { width:100%; max-width:320px; aspect-ratio:1/1; overflow:hidden; border-radius:20px; background:var(--bg1,#0b1222); border:1px solid var(--stroke, rgba(255,255,255,.08)); }
    .panel-cover img { width:100%; height:100%; object-fit:cover; display:block; }
    .panel-meta h3 { margin:0 0 6px; font-family:var(--font-display, Georgia, serif); color:var(--gold); font-size:2rem; line-height:1; }
    .panel-sub { color:var(--muted); margin-bottom:12px; }
    .panel-message { color:var(--muted); margin-bottom:12px; }
    .panel-actions { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; }

    .tracklist { display:grid; gap:10px; max-height:620px; overflow:auto; padding-right:4px; }
    .track-row {
      display:grid; grid-template-columns:48px 1fr auto auto; gap:12px; align-items:center;
      padding:10px 12px; border-radius:16px; background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.06);
    }
    .track-num { color:var(--gold); font-weight:800; text-align:center; }
    .track-name { font-weight:700; line-height:1.3; }
    .track-actions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .track-audio audio { width:280px; max-width:100%; }
    .chip-btn {
      display:inline-flex; align-items:center; justify-content:center;
      min-width:94px; padding:8px 12px; border-radius:999px;
      border:1px solid rgba(212,168,67,.22); background:rgba(255,255,255,.04);
      color:var(--text); font-size:.8rem; font-weight:800; text-transform:uppercase; text-decoration:none;
      letter-spacing:.05em;
    }
    .chip-btn:hover { border-color:rgba(212,168,67,.38); }
    .chip-btn.is-hidden { display:none; }
    .footer-links { display:flex; gap:12px; flex-wrap:wrap; margin-top:20px; }

    @media (max-width:1180px) { .albums-grid { grid-template-columns: repeat(4,minmax(0,1fr)); } }
    @media (max-width:900px) {
      .nav-links-shell { justify-content:flex-start; }
      .albums-grid { grid-template-columns: repeat(3,minmax(0,1fr)); }
      .album-panel { grid-template-columns:1fr; }
      .radio-dock { grid-template-columns:72px 1fr; }
      .radio-controls { grid-column:1 / -1; }
    }
    @media (max-width:680px) {
      .albums-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .track-row { grid-template-columns:36px 1fr; }
      .track-actions { grid-column:1 / -1; }
      .track-audio audio { width:100%; }
      .panel-actions .btn { flex:1 1 0; }
    }
  </style>

    const $ = (s, root = document) => root.querySelector(s);
    const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));
    const isVip = () => localStorage.getItem(VIP_KEY) === 'true';

    function setUnlockLabel() {
      const link = document.querySelector('.nav-cta');
      if (!link) return;
      if (isVip()) {
        link.textContent = 'VIP Unlocked';
        link.href = '#';
      }
    }

    function renderAlbums() {
      $('#albumsGrid').innerHTML = MUSIC_DATA.map(album => `
        <article class="album-card" data-slug="${album.slug}" tabindex="0" role="button" aria-label="Open ${album.title}">
          <div class="album-cover">
            <img src="${album.cover}" alt="${album.title} cover" loading="lazy">
            <div class="album-badge">ALBUM</div>
            ${isVip() ? '' : '<div class="album-lock">VIP</div>'}
            <div class="album-copy">
              <div class="album-title">${album.title}</div>
              <div class="album-meta">${album.artist}${album.year && album.year !== '—' ? ' • ' + album.year : ''}</div>
            </div>
          </div>
        </article>
      `).join('');

      $$('.album-card').forEach(card => {
        card.addEventListener('click', () => openAlbum(card.dataset.slug));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openAlbum(card.dataset.slug);
          }
        });
      });
    }

    function openAlbum(slug) {
      const album = MUSIC_DATA.find(a => a.slug === slug);
      if (!album) return;
      if (!isVip()) {
        window.location.href = 'unlock.html?from=music.html';
        return;
      }

      $('#albumPanel').innerHTML = `
        <div class="panel-cover">
          <img src="${album.cover}" alt="${album.title} cover" loading="lazy">
        </div>
        <div class="panel-meta">
          <h3>${album.title}</h3>
          <div class="panel-sub">${album.artist}${album.year && album.year !== '—' ? ' • ' + album.year : ''}</div>
          <div class="panel-message">Full album access is open.</div>

          <div class="panel-actions">
            ${album.buy ? `<a class="btn btn-primary" href="${album.buy}" target="_blank" rel="noopener">Buy Album — $10.00</a>` : ""}
          </div>

          <div class="tracklist">
            ${album.tracks.map((track, i) => `
              <div class="track-row">
                <div class="track-num">${track.num || (i+1)}</div>
                <div class="track-name">${track.title}</div>
                <div class="track-actions">
                  <div class="track-audio">
                    <audio controls preload="none">
                      <source src="${track.audio}" type="audio/mpeg">
                    </audio>
                  </div>
                  <a class="chip-btn ${track.video ? '' : 'is-hidden'}" href="${track.video || '#'}" target="_blank" rel="noopener">Video</a>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      $('#albumPanel').classList.add('open');
      $('#albumPanel').scrollIntoView({ behavior:'smooth', block:'start' });
      bindSingleAudio();
    }

    function bindSingleAudio() {
      const audios = $$('audio');
      audios.forEach(audio => {
        if (audio.dataset.boundSingle === '1') return;
        audio.dataset.boundSingle = '1';
        audio.addEventListener('play', () => {
          audios.forEach(other => { if (other !== audio) try { other.pause(); } catch(e){} });
        });
      });
    }

    const radioAudio = $('#radioAudio');
    const radioArt = $('#radioArt');
    const radioTitle = $('#radioTitle');
    const radioSubtitle = $('#radioSubtitle');
    const radioPlayBtn = $('#radioPlayBtn');
    const radioNextBtn = $('#radioNextBtn');
    const radioTracks = MUSIC_DATA.flatMap(album => album.tracks.map(track => ({
      album: album.title, cover: album.cover, title: track.title, src: track.audio
    })));
    let radioOn = false;
    let lastIndex = -1;

    function pickRadioTrack() {
      if (!radioTracks.length) return null;
      let i;
      do { i = Math.floor(Math.random() * radioTracks.length); } while (radioTracks.length > 1 && i === lastIndex);
      lastIndex = i;
      return radioTracks[i];
    }

    function updateRadioUi(track) {
      if (!track) return;
      radioArt.classList.remove('fallback');
      radioArt.innerHTML = `<img src="${track.cover}" alt="${track.album} cover">`;
      radioTitle.textContent = track.title;
      radioSubtitle.textContent = track.album;
    }

    function playRadioTrack() {
      const track = pickRadioTrack();
      if (!track) return;
      radioAudio.src = track.src;
      updateRadioUi(track);
      radioAudio.play().catch(() => {});
      bindSingleAudio();
    }

    radioPlayBtn.addEventListener('click', () => {
      if (!radioOn) {
        radioOn = true;
        radioPlayBtn.textContent = '⏸ Pause radio';
        playRadioTrack();
      } else if (radioAudio.paused) {
        radioAudio.play().catch(() => {});
        radioPlayBtn.textContent = '⏸ Pause radio';
      } else {
        radioAudio.pause();
        radioPlayBtn.textContent = '▶ Play radio';
      }
    });
    radioNextBtn.addEventListener('click', () => {
      radioOn = true;
      radioPlayBtn.textContent = '⏸ Pause radio';
      playRadioTrack();
    });
    radioAudio.addEventListener('ended', () => { if (radioOn) playRadioTrack(); });

    renderAlbums();
    bindSingleAudio();
